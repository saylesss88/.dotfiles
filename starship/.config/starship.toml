## FIRST LINE/ROW: Info & Status
# First param ─┌
[username]
format = " [╭─$user]($style)@"
style_user = "bold #658594"
style_root = "bold #658594"
show_always = true

# Second param
[hostname]
format = "[$hostname]($style) in "
style = "bold #D27E99"
trim_at = "-"
ssh_only = false
disabled = false

# Third param
[directory]
style = "#957FB8"
truncation_length = 0
truncate_to_repo = true
truncation_symbol = "repo: "

# Before all the version info
[git_branch]
symbol = " "
style = "#658594"

[git_status]
style = "#C0A36E"
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"
deleted = "x"

# Last param in the first line/row
[cmd_duration]
min_time = 1
format = "took [$duration](#DCA561)"
disabled = false

## SECOND LINE/ROW: Prompt
[battery]
full_symbol = " "
charging_symbol = " "
discharging_symbol = " "
disabled = true

[[battery.display]]
threshold = 15
style = "bold #FF5D62"
disabled = true

[[battery.display]]
threshold = 50
style = "bold #C0A36E"
disabled = true

[[battery.display]]
threshold = 80
style = "bold #98BB6C"
disabled = true

[time]
format = " 🕙 $time($style)\n"
time_format = "%T"
style = "#DCD7BA"
disabled = true

# Prompt: param 2 └─
[character]
success_symbol = " [╰─󰣇](bold #658594)"
error_symbol = " [×](bold #FF5D62)"
# [character]
# # success_symbol = " [╰─λ](bold #658594)"
# success_symbol = " [╰─](bold #658594)[](bold #658594)"
# error_symbol = " [×](bold #FF5D62)[](bold #FF5D62)"

[status]
symbol = "🔴"
format = '[\[$symbol$status_common_meaning$status_signal_name$status_maybe_int\]]($style)'
map_symbol = true
disabled = false

