#=========================================================#
# Execs
#=========================================================#
# exec-once=/home/jr/.config/mango/autostart.sh
# exec-once=waybar -c ~/.config/mango/waybar/config.jsonc -s ~/.config/mango/waybar/style.css >/dev/null 2>&1 &

#=========================================================#
# Scroller Layout Settings
#=========================================================#
# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

#=========================================================#
# Master-Stack Layout Setting
#=========================================================#
new_is_master=1
smartgaps=0
default_mfact=0.55
default_nmaster=1

#=========================================================#
# Overview Setting
#=========================================================#
hotarea_size=1
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

#=========================================================#
# Misc
#=========================================================#
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=1
focus_cross_tag=1
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1
layerrule=animation_type_open:zoom,layer_name:wofi
layerrule=animation_type_close:zoom,layer_name:wofi

#=========================================================#
# Keyboard
#=========================================================#
repeat_rate=50
repeat_delay=300
numlockon=1
xkb_rules_layout=us
# map escape to Caps lock
xkb_rules_options=caps:escape

#=========================================================#
# Trackpad
#=========================================================#
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

#=========================================================#
# Mouse
#=========================================================#
# need relogin to make it apply
mouse_natural_scrolling=0

#=========================================================#
# Appearance
#=========================================================#
gappih=5
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=1
# rootcolor=0x201b14ff
# bordercolor=0x444444ff
# focuscolor=0xc9b890ff
# maximizescreencolor=0x89aa61ff
# urgentcolor=0xad401fff
# scratchpadcolor=0x516c93ff
# globalcolor=0xb153a7ff
# overlaycolor=0x14a57cff

#=========================================================#
# Tokyo Night - Night (OLED / ultra dark)
#=========================================================#

# Compositor background
rootcolor=0x1a1b26ff

# Inactive window borders
bordercolor=0x292e42ff

# Focused window glow
# focuscolor=0x7aa2f7ff
focuscolor=0x5f7fd8ff

# Maximized window indicator
maximizescreencolor=0x9ece6aff

# Urgent window
urgentcolor=0xf7768eff

# Scratchpad windows
scratchpadcolor=0x7dcfffff

# Global accents (UI highlights)
globalcolor=0xbb9af7ff

# Overlays, menus, effects
overlaycolor=0x9d7cd8ff

#=========================================================#
# Environment Variables (Cursor Size & Theme)
#=========================================================#
# cursor_size=48
# cursor_theme=Adwaita
# env=GTK_THEME,Adwaita:dark
# env=XCURSOR_SIZE,24
# env=GDK_SCALE,2

source=./bind.conf
source=./monitor.conf
source=./animations.conf
source=./tags.conf

exec-once=~/.config/mango/autostart.sh
